<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Yoviee ❤️</title>

<style>
body {
    margin: 0;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    font-family: 'Comic Sans MS', cursive;
    text-align: center;
    color: white;
    overflow: hidden;
}

h1 {
    margin-top: 40px;
    font-size: 40px;
}

button {
    padding: 15px 25px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    background: white;
    color: #ff4d6d;
    cursor: pointer;
}

#content {
    display: none;
    margin-top: 20px;
}

#message {
    font-size: 22px;
    margin-top: 20px;
    white-space: pre-line;
}

img {
    width: 200px;
    border-radius: 15px;
    margin: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

.heart {
    position: absolute;
    animation: float 5s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday Yoviee 💖</h1>

<button onclick="start()">Click Here My Love 😏💘</button>

<div id="content">
    <div id="message"></div>

    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
</div>

<audio id="music" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
function start() {
    document.getElementById("content").style.display = "block";
    document.getElementById("music").play();
    typeText();
}

let text = "Yoviee 💖\n\nYou are not just special...\nYou are MY everything 🥹❤️\n\nThank you for loving me,\nfor caring for me,\nand for being mine 💘\n\nHappy Birthday My Love 🎂✨\n\nI love you forever 💖";

let i = 0;
function typeText() {
    if (i < text.length) {
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeText, 50);
    }
}

// floating hearts
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 300);
</script>

</body>
</html>
