<!DOCTYPE html>
<html>
<head>
<title>For Yoviee ❤️</title>

<style>
body{
margin:0;
font-family:cursive;
text-align:center;
background:radial-gradient(circle,pink,purple);
color:white;
overflow-x:hidden;
}

h1{
text-shadow:0 0 10px white,0 0 20px pink;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:20px;
background:white;
color:purple;
font-weight:bold;
cursor:pointer;
}

section{display:none;}

.chat{
background:white;
color:black;
padding:10px;
border-radius:10px;
display:inline-block;
max-width:80%;
}

#loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
z-index:999;
}
</style>
</head>

<body>

<div id="loader">Loading your surprise... 💖</div>

<h1>For You ❤️</h1>

<div id="intro">
<p>Tap anywhere for music 🎶</p>
<button onclick="start()">Start 💖</button>
</div>

<div id="options" style="display:none;">
<button onclick="show('romantic')">💌 Romantic</button>
<button onclick="show('cute')">🐻 Cute</button>
<button onclick="show('birthday')">🎂 Birthday</button>
<button onclick="secret()">🔐 Secret</button>
<button onclick="show('question')">💍 Question</button>
</div>

<!-- ROMANTIC -->
<section id="romantic">
<h2 id="heading"></h2>
<p id="text" class="chat"></p>
<button onclick="next()">Next ❤️</button>
<button onclick="hearts()">💜</button>
</section>

<!-- CUTE -->
<section id="cute">
<h2>Cute 🐻</h2>
<img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">
<img src="https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif">
</section>

<!-- BIRTHDAY -->
<section id="birthday">
<h2>🎂 Tap Gift 🎁</h2>
<button onclick="gift()">Open 🎁</button>
<div id="gift" style="display:none;">
<h3>Happy Birthday ❤️</h3>
</div>
</section>

<!-- QUESTION -->
<section id="question">
<h2>Will you marry me? 💍❤️</h2>
<button onclick="ans()">Yes 😍</button>
<button onmouseover="move(this)">No 😏</button>
<p id="ans"></p>
</section>

<audio id="music" loop>
<source src="song.mp3">
</audio>

<script>

// loader
setTimeout(()=>loader.style.display="none",2000);

// greeting
let hour=new Date().getHours();
alert(hour<12?"Good Morning ❤️":"Good Evening ❤️");

// start
function start(){
intro.style.display="none";
options.style.display="block";

let m=music;
m.play();
m.volume=0;
let fade=setInterval(()=>{
if(m.volume<1){m.volume+=0.1;}
else clearInterval(fade);
},300);
}

// sections
function show(id){
document.querySelectorAll("section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

// letter
let steps=[
"Aap meri life ka sabse beautiful part ho ❤️",
"Aap meri aadat ban gaye ho 💖",
"Aapke bina sab incomplete lagta hai 💔",
"Aap meri duniya ho ❤️",
"I love you forever ❤️"
];

let i=0;

// typing
function type(text){
textEl.innerHTML="";
let j=0;
let t=setInterval(()=>{
textEl.innerHTML+=text[j];
j++;
if(j>=text.length) clearInterval(t);
},30);
}

function next(){
i++;
if(i>=steps.length){
alert("You are my everything ❤️\nForever yours 💖");
i=0;
}
type(steps[i]);
}

// auto slide
setInterval(next,5000);

// hearts
function hearts(){
for(let i=0;i<15;i++){
let h=document.createElement("div");
h.innerText="💜";
h.style.position="fixed";
h.style.left=Math.random()*100+"vw";
h.style.top=Math.random()*100+"vh";
document.body.appendChild(h);
setTimeout(()=>h.remove(),1500);
}
}

// click hearts
document.body.onclick=(e)=>{
let h=document.createElement("div");
h.innerText="💖";
h.style.position="fixed";
h.style.left=e.clientX+"px";
h.style.top=e.clientY+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),1000);
};

// secret
function secret(){
let p=prompt("Password 💖");
if(p && p.toLowerCase()=="daddy"){
alert("You unlocked my heart ❤️");
}else alert("Wrong 😏");
}

// gift
function gift(){
gift.style.display="block";
alert("🎉 Surprise 🎉");
}

// question
function ans(){
ans.innerText="Of course it's always you ❤️";
}
function move(btn){
btn.style.position="absolute";
btn.style.left=Math.random()*80+"vw";
btn.style.top=Math.random()*80+"vh";
}

// random popup
setInterval(()=>alert("I love you ❤️"),20000);

</script>

</body>
</html>
