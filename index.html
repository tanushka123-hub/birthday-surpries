<!DOCTYPE html>
<html>
<head>
<title>For Yoviee ❤️</title>

<style>
body {
  margin:0;
  font-family:cursive;
  text-align:center;
  background:linear-gradient(to right,pink,purple);
  color:white;
}

button {
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:20px;
  background:white;
  color:purple;
  font-weight:bold;
}

section {display:none;}
img {width:120px; margin:10px;}
</style>

</head>

<body>

<h1>For You ❤️</h1>
<button onclick="start()">Open Surprise 💖</button>

<div id="options">
<button onclick="show('romantic')">💌 Romantic</button>
<button onclick="show('cute')">🐻 Cute</button>
<button onclick="show('birthday')">🎂 Birthday</button>
<button onclick="secret()">🔐 Secret</button>
<button onclick="show('question')">💍 Question</button>
</div>

<!-- ROMANTIC -->
<section id="romantic">
<h2 id="heading"></h2>
<p id="text"></p>
<button onclick="next()">Next ❤️</button>
<button onclick="hearts()">💜 Tap Me</button>
</section>

<!-- CUTE -->
<section id="cute">
<h2>Cute 🐻</h2>
<img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">
<img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">
<img src="https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif">
</section>

<!-- BIRTHDAY -->
<section id="birthday">
<h2>🎂 Tap Gift 🎁</h2>
<button onclick="gift()">Open 🎁</button>
<div id="gift" style="display:none;">
<h3>Happy Birthday ❤️</h3>
<img src="https://media.giphy.com/media/3oz8xKaR836UJOYeOc/giphy.gif">
</div>
</section>

<!-- QUESTION -->
<section id="question">
<h2>Will you marry me? 💍❤️</h2>
<button onclick="ans()">Yes 😍</button>
<button onclick="wrong()">No 😏</button>
<p id="ans"></p>
</section>

<!-- MUSIC -->
<audio id="music" loop>
<source src="song.mp3">
</audio>

<script>

// START
function start(){
document.getElementById("options").style.display="block";
document.getElementById("music").play();
}

// SHOW SECTION
function show(id){
document.querySelectorAll("section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

// 💌 FULL LETTER (AAP STYLE)
let steps=[
{text:"Yoviee ❤️\n\nHappy Birthday to the most special person in my life 🎂💖\n\nSach bolu… aap meri life ka sabse beautiful part ho.\n\nPehle hum strangers the… lekin aaj aap meri duniya ban chuke ho ❤️"},
{text:"Yaad hai wo starting… jab hum bas normal baate karte the…\n\nAur dheere dheere wo baate important ho gayi 💖\n\nAap meri aadat ban gaye… bina aapse baat kiye din complete nahi hota ❤️"},
{text:"Pata hi nahi chala kab aap itne special ban gaye 💫\n\nAapki har baat… har smile… sab kuch matter karta hai 💖\n\nHumare beech jo connection hai… wo real hai ❤️"},
{text:"Aap sirf meri life ka part nahi ho… aap meri life ho ❤️\n\nAapke bina sab incomplete lagta hai 💔\n\nAap meri happiness ho… meri peace ho… sab kuch 💖"},
{text:"Aaj aapka birthday hai 💖\n\nThank you meri life me aane ke liye ❤️\n\nAap meri best decision ho 💫"},
{text:"I love you forever ❤️\n\nAur hamesha karti rahungi 💖\n\nChahe kuch bhi ho jaye… main hamesha aapke saath hu ❤️\n\nHappy Birthday My Love 🎂💖\n\n– Sirf aapki ❤️"}
];

let i=0;

// TYPE EFFECT
function type(text){
let el=document.getElementById("text");
el.innerHTML="";
let j=0;
let inter=setInterval(()=>{
el.innerHTML+=text[j];
j++;
if(j>=text.length) clearInterval(inter);
},30);
}

function next(){
i++;
if(i>=steps.length){
alert("I LOVE YOU ❤️ FOREVER 💖");
i=0;
}
type(steps[i].text);
}

// AUTO SLIDE
setInterval(next,5000);

// HEARTS
function hearts(){
for(let i=0;i<20;i++){
let h=document.createElement("div");
h.innerText="💜";
h.style.position="fixed";
h.style.left=Math.random()*100+"vw";
h.style.top=Math.random()*100+"vh";
document.body.appendChild(h);
setTimeout(()=>h.remove(),2000);
}
}

// SECRET
function secret(){
let p=prompt("Password 💖");
if(p && p.trim().toLowerCase()=="daddy"){
alert("I love you forever ❤️");
}else{
alert("Wrong 😏");
}
}

// GIFT
function gift(){
document.getElementById("gift").style.display="block";
}

// QUESTION
function ans(){
document.getElementById("ans").innerText="Of course it's always you ❤️";
}
function wrong(){
alert("Wrong answer 😏 try again 💘");
}

</script>

</body>
</html>
