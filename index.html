<!DOCTYPE html>
<html>
<head>
<title>For Yoviee ❤️</title>

<style>
body {
  margin: 0;
  font-family: cursive;
  background: linear-gradient(to right, pink, purple);
  color: white;
  text-align: center;
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

h1 {
  font-size: 28px;
  animation: fade 1.5s;
}

p {
  font-size: 18px;
  width: 80%;
  animation: fade 1.5s;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: white;
  color: purple;
  font-weight: bold;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(40px);}
  to {opacity: 1;}
}
</style>

</head>

<body>

<div class="container">
  <h1 id="heading"></h1>
  <p id="text"></p>
  <button onclick="nextStep()">Next ❤️</button>
</div>

<!-- 🎵 MUSIC -->
<audio id="music" autoplay loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>

let steps = [
{
heading: "The Beginning 💫",
text: "Yoviee ❤️\n\nHappy Birthday to the most special person in my life 💖✨\n\nSach bolu… aap meri life ka sabse beautiful part ho.\n\nPehle hum strangers the… lekin aaj aap meri duniya ban chuke ho ❤️"
},
{
heading: "From Strangers 💞",
text: "Yaad hai wo starting… jab hum bas normal baate karte the…\n\nAur dheere dheere wo baate important ho gayi 💖\n\nAap meri aadat ban gaye ❤️"
},
{
heading: "That Connection ❤️",
text: "Pata hi nahi chala kab aap itne special ban gaye 💫\n\nAapki har baat matter karti hai 💖\n\nHumara connection real hai ❤️"
},
{
heading: "You Are Special 💝",
text: "Aap meri happiness ho ❤️\n\nAapke bina sab incomplete lagta hai 💔\n\nAap meri life ho 💖"
},
{
heading: "Today ❤️",
text: "Aaj aapka birthday hai 💖\n\nThank you meri life me aane ke liye ❤️\n\nAap meri best decision ho 💫"
},
{
heading: "Forever ❤️",
text: "I love you forever ❤️\n\nHamesha aapke saath rahungi 💖\n\nHappy Birthday My Love 🎂💖\n\n– Sirf aapki ❤️"
}
];

let index = 0;

function showStep() {
  document.getElementById("heading").innerText = steps[index].heading;
  document.getElementById("text").innerText = steps[index].text;
}

function nextStep() {
  index++;
  if(index >= steps.length) index = 0;
  showStep();
}

showStep();

// 🎬 AUTO SLIDE (video jaisa)
setInterval(() => {
  nextStep();
}, 4000);

</script>

</body>
</html>
