
<!DOCTYPE html>
<html>
<head>
<title>For Yoviee ❤️</title>

<style>
body {
    margin:0;
    font-family:cursive;
    text-align:center;
    background: linear-gradient(to right, pink, purple);
    color:white;
}

button {
    padding:15px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#options, #romantic, #cute, #birthday {
    display:none;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>Happy Birthday Yoviee 💖</h1>

<button onclick="showOptions()">Open Surprise 😏</button>

<div id="options">
    <h2>Choose one 💘</h2>
    <button onclick="showRomantic()">💘 Romantic</button>
    <button onclick="showCute()">🧸 Cute</button>
    <button onclick="showBirthday()">🎂 Birthday</button>
</div>

<div id="romantic">
    <h2>For You 💖</h2>
    <p>
    (Yaha tera letter paste karegi 💌)
    </p>
</div>

<div id="cute">
    <h2>Cute Mode 🧸</h2>
    <p>You are my cutest person ever 😭💖</p>
    <img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">
</div>

<div id="birthday">
    <h2>Birthday Surprise 🎂</h2>
    <p>Happy Birthday My Love 💘</p>
    <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">
</div>

<audio id="music">
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
function showOptions() {
    document.getElementById("options").style.display = "block";
    document.getElementById("music").play();
}

function showRomantic() {
    document.getElementById("romantic").style.display = "block";
}

function showCute() {
    document.getElementById("cute").style.display = "block";
}

function showBirthday() {
    document.getElementById("birthday").style.display = "block";
}
</script>

</body>
</html>
