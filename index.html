<!DOCTYPE html>
<html>
<head>
<title>For Yoviee ❤️</title>

<style>
body{
margin:0;
font-family:cursive;
text-align:center;
background:radial-gradient(circle,pink,purple);
color:white;
overflow:hidden;
}

h1{
text-shadow:0 0 10px white,0 0 20px pink;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:20px;
background:white;
color:purple;
font-weight:bold;
cursor:pointer;
}

section{display:none;}

.chat{
background:white;
color:black;
padding:10px;
border-radius:10px;
display:inline-block;
max-width:80%;
}

#loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
z-index:999;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">Loading your surprise... 💖</div>

<h1>For You ❤️</h1>

<!-- INTRO -->
<div id="intro">
<p>Tap anywhere for music 🎶</p>
<button onclick="start()">Start 💖</button>
</div>

<!-- OPTIONS -->
<div id="options" style="display:none;">
<button onclick="show('romantic')">💌 Romantic</button>
<button onclick="show('cute')">🐻 Cute</button>
<button onclick="show('birthday')">🎂 Birthday</button>
<button onclick="secret()">🔐 Secret</button>
<button onclick="show('question')">💍 Question</button>
</div>

<!-- ROMANTIC -->
<section id="romantic">
<h2>Our Story 💖</h2>
<p id="text" class="chat"></p>
<button onclick="next()">Next ❤️</button>
<button onclick="hearts()">💜</button>
</section>

<!-- CUTE -->
<section id="cute">
<h2>Cute 🐻</h2>
<img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">
<img src="https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif">
</section>

<!-- BIRTHDAY -->
<section id="birthday">
<h2>🎂 Tap Gift 🎁</h2>
<button onclick="gift()">Open 🎁</button>
<div id="giftBox" style="display:none;">
<h3>Happy Birthday ❤️</h3>
</div>
</section>

<!-- QUESTION -->
<section id="question">
<h2>Will you marry me? 💍❤️</h2>
<button onclick="ans()">Yes 😍</button>
<button onmouseover="move(this)">No 😏</button>
<p id="ansText"></p>
</section>

<audio id="music" loop>
<source src="song.mp3">
</audio>

<script>

// LOADER
setTimeout(()=>loader.style.display="none",2000);

// GREETING
let hour=new Date().getHours();
alert(hour<12?"Good Morning ❤️":"Good Evening ❤️");

// START + MUSIC FADE
function start(){
intro.style.display="none";
options.style.display="block";

music.play();
music.volume=0;

let fade=setInterval(()=>{
if(music.volume<1){music.volume+=0.1;}
else clearInterval(fade);
},300);
}

// SHOW
function show(id){
document.querySelectorAll("section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

// 💌 FULL LETTER
let steps=[
"Yoviee ❤️\n\nHappy Birthday to the most special person in my life 🎂💖\n\nSach bolu… aap meri life ka sabse beautiful part ho.",
"Pehle hum strangers the… lekin aaj aap meri duniya ban chuke ho ❤️",
"Yaad hai wo starting… jab hum bas normal baate karte the…\n\nAur dheere dheere wo baate important ho gayi 💖",
"Aap meri aadat ban gaye… bina aapse baat kiye din complete nahi hota ❤️",
"Aapki har baat… har smile… sab kuch matter karta hai 💫",
"Aap sirf meri life ka part nahi ho… aap meri life ho ❤️",
"Aap meri happiness ho… meri peace ho… sab kuch 💖",
"Aaj aapka birthday hai 🎂✨\n\nThank you meri life me aane ke liye ❤️",
"Aap meri best decision ho 💘",
"I love you forever ❤️\n\n– Sirf aapki 💖"
];

let i=0;

// TYPE EFFECT
function type(text){
textEl.innerHTML="";
let j=0;
let t=setInterval(()=>{
textEl.innerHTML+=text[j];
j++;
if(j>=text.length) clearInterval(t);
},30);
}

// NEXT
function next(){
i++;
if(i>=steps.length){
alert("You are my everything ❤️\nForever yours 💖");
i=0;
}
type(steps[i]);
}

// AUTO SLIDE
setInterval(next,5000);

// HEART EXPLOSION
function hearts(){
for(let i=0;i<15;i++){
let h=document.createElement("div");
h.innerText="💜";
h.style.position="fixed";
h.style.left=Math.random()*100+"vw";
h.style.top=Math.random()*100+"vh";
document.body.appendChild(h);
setTimeout(()=>h.remove(),1500);
}
}

// CLICK HEARTS
document.body.onclick=(e)=>{
let h=document.createElement("div");
h.innerText="💖";
h.style.position="fixed";
h.style.left=e.clientX+"px";
h.style.top=e.clientY+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),1000);
};

// SECRET
function secret(){
let p=prompt("Password 💖");
if(p && p.toLowerCase()=="daddy"){
alert("You unlocked my heart ❤️");
}else alert("Wrong 😏");
}

// GIFT
function gift(){
giftBox.style.display="block";
alert("🎉🎉 SURPRISE 🎉🎉");
}

// QUESTION
function ans(){
ansText.innerText="Of course it's always you ❤️";
}
function move(btn){
btn.style.position="absolute";
btn.style.left=Math.random()*80+"vw";
btn.style.top=Math.random()*80+"vh";
}

// RANDOM LOVE POPUP
setInterval(()=>alert("I love you ❤️"),20000);

</script>

</body>
</html>
